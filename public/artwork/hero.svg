<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000" role="img" aria-label="Ochtendlicht — placeholder">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#f3ddb0"/>
      <stop offset="0.42" stop-color="#e7a878"/>
      <stop offset="0.7" stop-color="#9c5d63"/>
      <stop offset="1" stop-color="#22324f"/>
    </linearGradient>
    <radialGradient id="dawn" cx="0.62" cy="0.34" r="0.55">
      <stop offset="0" stop-color="#fff4d6" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#f6cf86" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f6cf86" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
    <filter id="softer" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="canvasgrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="800" height="1000" fill="url(#ground)"/>

  <!-- painterly masses -->
  <g filter="url(#soft)">
    <ellipse cx="300" cy="760" rx="380" ry="190" fill="#1c2f4d" opacity="0.85"/>
    <ellipse cx="560" cy="560" rx="240" ry="150" fill="#b8666a" opacity="0.55"/>
    <ellipse cx="220" cy="430" rx="200" ry="130" fill="#e9b06f" opacity="0.6"/>
    <ellipse cx="640" cy="300" rx="180" ry="120" fill="#f6d79a" opacity="0.7"/>
  </g>
  <g filter="url(#softer)">
    <ellipse cx="500" cy="880" rx="420" ry="160" fill="#16223a" opacity="0.7"/>
  </g>

  <!-- the morning light -->
  <rect width="800" height="1000" fill="url(#dawn)"/>

  <!-- a single confident horizon stroke -->
  <rect x="0" y="612" width="800" height="2.5" fill="#fff7e4" opacity="0.5"/>

  <!-- canvas grain -->
  <rect width="800" height="1000" fill="#000" filter="url(#canvasgrain)" opacity="0.5"/>
</svg>
