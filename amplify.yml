version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Vite 7 needs Node 20.19+/22.12+; pin to 22 on Amplify's build image
        - nvm install 22
        - nvm use 22
        - corepack enable
        # pin pnpm to match local (reads allowBuilds in pnpm-workspace.yaml)
        - corepack prepare pnpm@11.5.2 --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm build
  artifacts:
    # Vite outputs here
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
